<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống Kê Chi Tiêu Vũng Tàu</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- THAY ĐỔI: Sử dụng xlsx-js-style để hỗ trợ định dạng màu sắc/viền cho Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

    <style>
        /* Tùy chỉnh CSS khi in (PDF) mang phong cách chuyên nghiệp */
        @media print {
            body { 
                background-color: white !important; 
                -webkit-print-color-adjust: exact !important; /* Ép trình duyệt in cả màu nền */
                print-color-adjust: exact !important; 
            }
            .page-break { page-break-before: always; }
            .avoid-break { page-break-inside: avoid; }
            
            /* Ẩn thanh cuộn và căn lề trang giấy */
            @page { margin: 15mm; size: A4; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- Các Icon SVG ---
        const IconCalculator = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>
        );

        const IconUsers = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        );

        const IconReceipt = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1Z"></path><path d="M16 8h-6"></path><path d="M16 12h-8"></path><path d="M16 16h-8"></path></svg>
        );

        const IconArrowRightLeft = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m16 3 4 4-4 4"></path><path d="M20 7H4"></path><path d="m8 21-4-4 4-4"></path><path d="M4 17h16"></path></svg>
        );

        const IconEdit2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
        );

        const IconSave = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        );

        const IconX = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        );

        const IconExcel = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
        );

        const IconPdf = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        );

        // --- Dữ liệu logic ---
        const PEOPLE = ['Kha', 'Hoàng', 'Khang', 'Trâm Anh', 'Long', 'Tân', 'Phúc', 'Siêu'];

        const INITIAL_EXPENSES = [
            { id: 1, name: 'Tiền thuê Homestay', payer: 'Kha', amount: 2200000, excluded: [], custom: {}, note: 'Chia đều 8 người' },
            { id: 2, name: 'Tiền Grab Car (Đi) - Xe 1', payer: 'Hoàng', amount: 759000, excluded: ['Tân', 'Phúc', 'Kha', 'Siêu'], custom: {}, note: 'Chia đều 4 người (trừ Tân, Phúc, Kha, Siêu)' },
            { id: 3, name: 'Tiền Grab Car 2 (Đi) - Xe 2', payer: 'Kha', amount: 550000, excluded: ['Hoàng', 'Khang', 'Trâm Anh', 'Long', 'Tân', 'Phúc'], custom: {}, note: 'Chia đều 2 người (Kha, Siêu)' },
            { id: 4, name: 'Ăn sáng - Mì Trộn', payer: 'Khang', amount: 312000, excluded: ['Tân', 'Phúc', 'Trâm Anh'], custom: {}, note: 'Chia 5' },
            { id: 5, name: 'Phúc Long + Rengoku', payer: 'Kha', amount: 250000, excluded: ['Tân', 'Phúc'], custom: {}, note: 'Chia 6' },
            { id: 6, name: 'Thuê xe máy (3 xe + xăng)', payer: 'Kha', amount: 500000, excluded: [], custom: {}, note: 'Chia đều 8 người' },
            { id: 7, name: 'Xăng xe máy (2 xe còn lại)', payer: 'Hoàng', amount: 60000, excluded: [], custom: {}, note: 'Chia đều 8 người' },
            { id: 8, name: 'Kem bơ sầu riêng', payer: 'Kha', amount: 445000, excluded: [], custom: {}, note: 'Chia đều 8 người' },
            { id: 9, name: 'Coffee Suối Bên Biển', payer: 'Kha', amount: 624240, excluded: ['Hoàng'], custom: {}, note: 'Chia 7' },
            { id: 10, name: 'Ăn tối Nhà hàng La Sirena', payer: 'Kha', amount: 0, excluded: [], custom: {}, note: 'Chia đều 8 người (Chưa có giá)' },
            { id: 11, name: 'Tầng 2 (Karaoke + Đồ ăn)', payer: 'Kha', amount: 1800000, excluded: [], custom: {}, note: 'Chia đều 8 người' },
            { id: 12, name: 'Tầng 3 (Bia + Mồi + Trái cây...)', payer: 'Kha', amount: 1130000, excluded: [], custom: {}, note: 'Chia đều 8 người' },
            { id: 13, name: 'Tiền ăn brunch', payer: 'Trâm Anh', amount: 918000, excluded: ['Kha'], custom: { 'Khang': 70000 }, note: 'Chia 7, Khang 70k' },
            {
                id: 14,
                name: 'Bánh bông lan',
                payer: 'Long',
                amount: 185000,
                excluded: ['Hoàng', 'Khang', 'Long', 'Tân', 'Phúc', 'Siêu'],
                custom: {
                    'Trâm Anh': 37000,
                    'Kha': 148000
                },
                note: 'Trâm Anh 1 hộp 37k, phần còn lại của Kha 148k'
            },
            { id: 15, name: 'Trà sữa', payer: 'Long', amount: 135000, excluded: ['Kha', 'Khang'], custom: { 'Hoàng': 25000 }, note: 'Hoàng 25k, còn lại chia 5' },
            {
                id: 16,
                name: 'Tiền donut',
                payer: 'Tân',
                amount: 514000,
                excluded: ['Hoàng'],
                custom: {
                    'Trâm Anh': 514000 * 130000 / 525000,
                    'Tân': 514000 * 65000 / 525000,
                    'Phúc': 514000 * 65000 / 525000,
                    'Siêu': 514000 * 65000 / 525000,
                    'Kha': 514000 * 65000 / 525000,
                    'Hoàng': 514000 * 65000 / 525000,
                    'Long': 514000 * 70000 / 525000
                },
                note: 'Tổng 514k sau voucher. CB7 65k: Trâm Anh 2 hộp, Tân/Phúc/Siêu/Kha/Hoàng mỗi người 1 hộp. CB8 70k: Long 1 hộp.'
            },
            { id: 17, name: 'Tiền xe về', payer: 'Trâm Anh', amount: 800000, excluded: ['Tân', 'Phúc', 'Kha'], custom: {}, note: 'Chia 5' },
        ];

        function App() {
            const [expenses, setExpenses] = useState(INITIAL_EXPENSES);
            const [editingId, setEditingId] = useState(null);
            const [editAmount, setEditAmount] = useState('');
            const [selectedExpense, setSelectedExpense] = useState(null);
            const [activeTab, setActiveTab] = useState('overview');

            const formatMoney = (amount) => {
                return new Intl.NumberFormat('vi-VN', { 
                    style: 'currency', 
                    currency: 'VND' 
                }).format(Math.round(amount));
            };

            const getExpenseDetails = (exp) => {
                if (!exp || exp.amount <= 0) return [];
                let details = [];
                let remainingAmount = exp.amount;
                let participantsPool = PEOPLE.filter(p => !exp.excluded.includes(p));

                if (Object.keys(exp.custom).length > 0) {
                    Object.entries(exp.custom).forEach(([person, specificAmount]) => {
                        details.push({
                            person,
                            amount: specificAmount,
                            type: 'Riêng'
                        });
                        remainingAmount -= specificAmount;
                        participantsPool = participantsPool.filter(p => p !== person);
                    });
                }

                if (participantsPool.length > 0) {
                    const splitAmount = remainingAmount / participantsPool.length;
                    participantsPool.forEach(person => {
                        details.push({
                            person,
                            amount: splitAmount,
                            type: 'Chia đều'
                        });
                    });
                }
                return details;
            };

            const handleSaveAmount = (id) => {
                setExpenses(expenses.map(exp => 
                    exp.id === id ? { ...exp, amount: Number(editAmount) || 0 } : exp
                ));
                setEditingId(null);
            };

            // Tính toán số dư
            const balances = useMemo(() => {
                let calcBalances = {};
                PEOPLE.forEach(p => calcBalances[p] = 0);

                expenses.forEach(exp => {
                    if (exp.amount > 0) {
                        calcBalances[exp.payer] += exp.amount;

                        let remainingAmount = exp.amount;
                        let participantsPool = PEOPLE.filter(p => !exp.excluded.includes(p));

                        if (Object.keys(exp.custom).length > 0) {
                            Object.entries(exp.custom).forEach(([person, specificAmount]) => {
                                calcBalances[person] -= specificAmount;
                                remainingAmount -= specificAmount;
                                participantsPool = participantsPool.filter(p => p !== person);
                            });
                        }

                        if (participantsPool.length > 0) {
                            const splitAmount = remainingAmount / participantsPool.length;
                            participantsPool.forEach(person => {
                                calcBalances[person] -= splitAmount;
                            });
                        }
                    }
                });
                return calcBalances;
            }, [expenses]);

            // Tính toán giao dịch
            const transfers = useMemo(() => {
                const BANKER = 'Kha';
                let results = [];

                PEOPLE.forEach(person => {
                    if (person === BANKER) return;
                    const balance = balances[person];
                    if (balance < -1) { 
                        results.push({ 
                            from: person, 
                            to: BANKER, 
                            amount: Math.abs(balance), 
                            type: 'pay_banker' 
                        });
                    } else if (balance > 1) {
                        results.push({ 
                            from: BANKER, 
                            to: person, 
                            amount: balance, 
                            type: 'receive_from_banker' 
                        });
                    }
                });
                return results.sort((a, b) => a.type === 'pay_banker' ? -1 : 1);
            }, [balances]);

            // Chi tiết từng cá nhân
            const detailedBreakdown = useMemo(() => {
                const breakdown = {};
                PEOPLE.forEach(p => {
                    breakdown[p] = {
                        consumed: [],
                        paid: [],
                        totalConsumed: 0,
                        totalPaid: 0
                    };
                });

                expenses.forEach(exp => {
                    if (exp.amount <= 0) return;

                    breakdown[exp.payer].paid.push({ 
                        name: exp.name, 
                        amount: exp.amount 
                    });
                    breakdown[exp.payer].totalPaid += exp.amount;

                    let remainingAmount = exp.amount;
                    let participantsPool = PEOPLE.filter(p => !exp.excluded.includes(p));

                    if (Object.keys(exp.custom).length > 0) {
                        Object.entries(exp.custom).forEach(([person, specificAmount]) => {
                            breakdown[person].consumed.push({ 
                                name: exp.name + " (Riêng)", 
                                amount: specificAmount 
                            });
                            breakdown[person].totalConsumed += specificAmount;
                            remainingAmount -= specificAmount;
                            participantsPool = participantsPool.filter(p => p !== person);
                        });
                    }

                    if (participantsPool.length > 0) {
                        const splitAmount = remainingAmount / participantsPool.length;
                        participantsPool.forEach(person => {
                            breakdown[person].consumed.push({ 
                                name: exp.name, 
                                amount: splitAmount 
                            });
                            breakdown[person].totalConsumed += splitAmount;
                        });
                    }
                });
                return breakdown;
            }, [expenses]);

            const totalSpent = expenses.reduce((sum, exp) => sum + exp.amount, 0);

            // NÂNG CẤP: Hàm Xuất Excel Định Dạng Chuyên Nghiệp
            const exportToExcel = () => {
                // Style Constants
                const COLOR_PRIMARY = "0F172A"; // Slate 900
                const COLOR_SECONDARY = "F8FAFC"; // Slate 50
                const COLOR_BORDER = "CBD5E1"; // Slate 300
                const COLOR_TEXT = "1E293B"; // Slate 800
                const COLOR_SUCCESS = "16A34A"; // Green 600
                const COLOR_DANGER = "DC2626"; // Red 600

                // 1. Tạo Workbook
                const wb = XLSX.utils.book_new();

                // Hàm hỗ trợ áp dụng style cho toàn Sheet
                const applyStyling = (ws, titleRowIdx, headerRowIdx, colWidths) => {
                    ws['!cols'] = colWidths;
                    
                    for (const cellAddr in ws) {
                        if (cellAddr[0] === '!') continue; // Skip metadata
                        const col = cellAddr.replace(/[0-9]/g, '');
                        const row = parseInt(cellAddr.replace(/\D/g, '')) - 1; // 0-indexed
                        
                        let cellStyle = {
                            font: { name: "Arial", sz: 11, color: { rgb: COLOR_TEXT } },
                            alignment: { vertical: "center" },
                            border: {
                                top: { style: "thin", color: { rgb: COLOR_BORDER } },
                                bottom: { style: "thin", color: { rgb: COLOR_BORDER } },
                                left: { style: "thin", color: { rgb: COLOR_BORDER } },
                                right: { style: "thin", color: { rgb: COLOR_BORDER } }
                            }
                        };

                        if (row === titleRowIdx) {
                            cellStyle = {
                                font: { name: "Arial", sz: 16, bold: true, color: { rgb: "FFFFFF" } },
                                fill: { fgColor: { rgb: COLOR_PRIMARY } },
                                alignment: { horizontal: "center", vertical: "center" }
                            };
                        } else if (row === headerRowIdx) {
                            cellStyle.font = { name: "Arial", sz: 12, bold: true, color: { rgb: "FFFFFF" } };
                            cellStyle.fill = { fgColor: { rgb: COLOR_PRIMARY } };
                            cellStyle.alignment = { horizontal: "center", vertical: "center" };
                        } else if (ws[cellAddr].t === 'n') {
                            // Cột số (Tiền tệ)
                            cellStyle.numFmt = "#,##0";
                        }

                        // Style Dư/Nợ
                        if (ws[cellAddr].v === "Dư" || ws[cellAddr].v === "Nhận lại từ quỹ") {
                            cellStyle.font.color = { rgb: COLOR_SUCCESS };
                            cellStyle.font.bold = true;
                        } else if (ws[cellAddr].v === "Nợ" || ws[cellAddr].v === "Cần đóng thêm") {
                            cellStyle.font.color = { rgb: COLOR_DANGER };
                            cellStyle.font.bold = true;
                        }

                        ws[cellAddr].s = cellStyle;
                    }
                };

                // --- Sheet 1: Thanh Toán Cuối Cùng ---
                const sheet1Data = [
                    ["BÁO CÁO TỔNG QUAN THANH TOÁN - VŨNG TÀU", "", "", "", ""],
                    [],
                    ["Người Gửi (Đóng thêm)", "Người Nhận (Thủ quỹ)", "Số Tiền", "Trạng Thái", "Mô Tả Chi Tiết"]
                ];
                transfers.forEach(t => {
                    sheet1Data.push([
                        t.from, 
                        t.to, 
                        t.amount, 
                        t.type === 'pay_banker' ? "Cần đóng thêm" : "Nhận lại từ quỹ",
                        t.type === 'pay_banker' ? `${t.from} chuyển khoản cho ${t.to}` : `${t.to} chuyển khoản cho ${t.from}`
                    ]);
                });
                const ws1 = XLSX.utils.aoa_to_sheet(sheet1Data);
                ws1['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 4 } }]; // Merge title
                applyStyling(ws1, 0, 2, [{wch: 25}, {wch: 25}, {wch: 20}, {wch: 20}, {wch: 40}]);
                XLSX.utils.book_append_sheet(wb, ws1, "1. Tổng Quan Thanh Toán");

                // --- Sheet 2: Cấn Trừ Cá Nhân ---
                const sheet2Data = [
                    ["CHI TIẾT THU CHI TỪNG CÁ NHÂN", "", "", "", ""],
                    [],
                    ["Thành Viên", "Đã Ứng Trước (1)", "Phần Sử Dụng (2)", "Chênh Lệch (1)-(2)", "Đánh Giá"]
                ];
                PEOPLE.forEach(p => {
                    const d = detailedBreakdown[p];
                    const net = d.totalPaid - d.totalConsumed;
                    const status = net > 0 ? "Dư" : (net < 0 ? "Nợ" : "Hòa");
                    sheet2Data.push([p, d.totalPaid, d.totalConsumed, net, status]);
                });
                const ws2 = XLSX.utils.aoa_to_sheet(sheet2Data);
                ws2['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 4 } }];
                applyStyling(ws2, 0, 2, [{wch: 20}, {wch: 20}, {wch: 20}, {wch: 25}, {wch: 15}]);
                XLSX.utils.book_append_sheet(wb, ws2, "2. Cấn Trừ Cá Nhân");

                // --- Sheet 3: Danh Sách Hóa Đơn ---
                const sheet3Data = [
                    ["DANH SÁCH CHI TIẾT CÁC HÓA ĐƠN", "", "", "", "", ""],
                    [],
                    ["STT", "Hạng Mục Chi Tiêu", "Người Trả (Gốc)", "Tổng Tiền", "Loại Trừ (Không tính)", "Ghi Chú Nhanh"]
                ];
                expenses.forEach((exp, i) => {
                    sheet3Data.push([
                        i + 1, 
                        exp.name, 
                        exp.payer, 
                        exp.amount, 
                        exp.excluded.length > 0 ? exp.excluded.join(', ') : "Không", 
                        exp.note
                    ]);
                });
                const ws3 = XLSX.utils.aoa_to_sheet(sheet3Data);
                ws3['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 5 } }];
                applyStyling(ws3, 0, 2, [{wch: 8}, {wch: 40}, {wch: 20}, {wch: 15}, {wch: 35}, {wch: 40}]);
                XLSX.utils.book_append_sheet(wb, ws3, "3. Hóa Đơn Gốc");

                // Xuất file
                XLSX.writeFile(wb, "Bao_Cao_Chi_Tieu_Vung_Tau.xlsx");
            };

            return (
                <div className="font-sans min-h-screen">
                    
                    {/* GIAO DIỆN APP CHÍNH (Sẽ bị ẩn khi in ra PDF) */}
                    <div className="print:hidden p-4 md:p-8">
                        <div className="max-w-6xl mx-auto space-y-6">
                            
                            {/* Header */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8 text-center relative">
                                <h1 className="text-3xl font-bold text-slate-900 mb-2 flex items-center justify-center gap-3">
                                    <IconCalculator className="text-blue-600" size={32} />
                                    Tổng Kết Chi Phí Chuyến Đi
                                </h1>
                                <p className="text-slate-500 mb-6">
                                    Mọi khoản thu chi sẽ được cấn trừ và chuyển về một mối duy nhất là 
                                    <strong className="text-blue-600"> Duy Kha</strong>.
                                </p>
                                
                                <div className="flex flex-wrap justify-center gap-3">
                                    <button 
                                        onClick={exportToExcel} 
                                        className="flex items-center gap-2 bg-emerald-600 text-white px-5 py-2.5 rounded-lg hover:bg-emerald-700 transition-all text-sm font-semibold shadow-md hover:shadow-lg hover:-translate-y-0.5"
                                    >
                                        <IconExcel size={18} />
                                        Xuất Excel Chuyên Nghiệp (.xlsx)
                                    </button>
                                    
                                    <button 
                                        onClick={() => {
                                            alert("Mẹo in PDF chuẩn: Ở giao diện in, hãy chắc chắn bạn đã BẬT tuỳ chọn 'Đồ hoạ nền' (Background Graphics) để báo cáo hiển thị đủ màu sắc nhé!");
                                            setTimeout(() => window.print(), 500);
                                        }} 
                                        className="flex items-center gap-2 bg-slate-900 text-white px-5 py-2.5 rounded-lg hover:bg-slate-800 transition-all text-sm font-semibold shadow-md hover:shadow-lg hover:-translate-y-0.5"
                                    >
                                        <IconPdf size={18} />
                                        Lưu Hóa Đơn PDF (In)
                                    </button>
                                </div>
                            </div>

                            {/* Thanh Tab Navigation */}
                            <div className="flex justify-center flex-wrap gap-2 md:gap-4 bg-white p-2 rounded-xl shadow-sm border border-slate-100">

                                                        : net < 0 ? <span className="text-rose-600">Nợ: {formatMoney(Math.abs(net))}</span> 
                                                        : <span className="text-slate-400">Hòa</span>}
                                                    </td>
                                                </tr>
                                            )
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Trang 2: Chi tiết các hóa đơn */}
                        <div className="p-8 page-break pt-12">
                            <h2 className="text-lg font-bold mb-4 uppercase text-slate-900 flex items-center gap-3">
                                <span className="w-8 h-8 bg-slate-900 text-white rounded-lg flex items-center justify-center text-sm">3</span> 
                                Danh Sách Hóa Đơn Gốc
                            </h2>
                            <div className="rounded-xl overflow-hidden border-2 border-slate-200">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-slate-900 text-white">
                                        <tr>
                                            <th className="px-4 py-4 w-12 text-center font-semibold uppercase text-xs">#</th>
                                            <th className="px-4 py-4 font-semibold uppercase text-xs">Hạng Mục</th>
                                            <th className="px-4 py-4 font-semibold uppercase text-xs">Người Trả</th>
                                            <th className="px-4 py-4 text-right font-semibold uppercase text-xs w-32">Số Tiền</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-200 bg-white">
                                        {expenses.map((exp, index) => (
                                            <tr key={exp.id} className="even:bg-slate-50">
                                                <td className="px-4 py-4 text-center font-bold text-slate-400">{index + 1}</td>
                                                <td className="px-4 py-4">
                                                    <div className="font-bold text-slate-800">{exp.name}</div>
                                                    <div className="text-xs text-slate-500 mt-1 max-w-[300px]">{exp.note}</div>
                                                </td>
                                                <td className="px-4 py-4">
                                                    <span className="bg-slate-200 px-2 py-1 rounded text-xs font-bold text-slate-700">{exp.payer}</span>
                                                </td>
                                                <td className="px-4 py-4 text-right font-black text-blue-600">{formatMoney(exp.amount)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            
                            {/* Footer */}
                            <div className="mt-16 text-center text-sm text-slate-400 border-t border-slate-200 pt-6">
                                <p>Báo cáo được kết xuất tự động từ hệ thống quản lý chi tiêu nội bộ.</p>
                                <p className="mt-1">Mọi thắc mắc vui lòng liên hệ thủ quỹ.</p>
                            </div>
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
